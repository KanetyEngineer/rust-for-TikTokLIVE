<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust × TikTokLIVE Integration</title>
    <style>
        /* --- クリーンで洗練されたダークテーマのCSS --- */
        :root {
            --bg-color: #0f111a;
            --card-bg: #161925;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-color: #6366f1;
            /* 鮮やかなパープル・ブルー */
            --accent-hover: #4f46e5;
            --success-color: #10b981;
            --border-color: #2d3142;
            --input-bg: #1f2335;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: block;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* ヘッダーデザイン */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #ff0050, #00f2fe, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* メインカード */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-color);
        }

        /* 現在の設定（読み取り専用） */
        .config-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .config-row:last-child {
            border-bottom: none;
        }

        .config-row .key {
            color: var(--text-muted);
        }

        .config-row .value {
            font-family: Consolas, monospace;
            word-break: break-all;
            text-align: right;
        }

        .hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 14px;
        }

        .hint code {
            background-color: var(--input-bg);
            padding: 1px 6px;
            border-radius: 4px;
        }

        /* デバッグパネル用デザイン */
        .debug-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .btn-debug {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-debug:hover {
            border-color: var(--accent-color);
            background-color: rgba(99, 102, 241, 0.1);
        }

        #testAlert {
            display: none;
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
        }

        /* フッター・ステータス */
        .status-bar {
            margin-top: 20px;
            display: block;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--success-color);
            border-radius: 50%;
            margin-right: 6px;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Rust × TikTokLIVE Controller</h1>
            <p>デバッグ・動作確認パネル</p>
        </header>

        <div class="card">
            <div class="section-title">現在の設定（読み取り専用）</div>
            <div class="config-row">
                <span class="key">tiktokId</span>
                <span class="value" id="cfgTiktokId">-</span>
            </div>
            <div class="config-row">
                <span class="key">steamId</span>
                <span class="value" id="cfgSteamId">-</span>
            </div>
            <div class="config-row">
                <span class="key">apiUrl</span>
                <span class="value" id="cfgApiUrl">-</span>
            </div>
            <p class="hint">設定を変更する場合は、このツールのフォルダにある <code>config.json</code> を直接編集し、
                <code>start.bat</code> を再起動してください。</p>
        </div>

        <div class="card" style="margin-top: 20px;">
            <div class="section-title">テスト・デバッグ実行</div>
            <p style="font-size: 12px; color: var(--text-muted);">
                配信外でもRustサーバーへ直接イベントを送信し、動作確認ができます。（※先に config.json の設定を済ませてください）
            </p>

            <div class="debug-grid">
                <button type="button" class="btn-debug" onclick="sendTest('follow_reward')">🎁 フォロー (資材)</button>
                <button type="button" class="btn-debug" onclick="sendTest('reduce_food')">🌹 バラ (食料-1)</button>
                <button type="button" class="btn-debug" onclick="sendTest('spawn_bear')">🐻 ハートミー (クマ)</button>
            </div>

            <div id="testAlert"></div>
        </div>

        <div class="status-bar">
            <span class="status-dot"></span> Local Web UI running on localhost:3000
        </div>
    </div>

    <script>
        // 起動時に現在の設定ファイルをAPI経由で取得し、読み取り専用欄に表示
        fetch('/api/config')
            .then(res => res.json())
            .then(data => {
                document.getElementById('cfgTiktokId').textContent = data.tiktokId || '(未設定)';
                document.getElementById('cfgSteamId').textContent = data.steamId || '(未設定)';
                document.getElementById('cfgApiUrl').textContent = data.apiUrl || '(未設定)';
            })
            .catch(err => console.error('設定データの取得に失敗しました:', err));

        // テストイベント送信用スクリプト
        async function sendTest(eventType) {
            const alertBox = document.getElementById('testAlert');
            alertBox.style.display = 'block';
            alertBox.style.backgroundColor = 'rgba(255,255,255,0.1)';
            alertBox.style.color = '#fff';
            alertBox.innerText = '送信中...';

            try {
                const res = await fetch('/api/test-event', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ eventType })
                });
                const data = await res.json();

                if (data.success) {
                    alertBox.style.backgroundColor = 'rgba(16, 185, 129, 0.15)';
                    alertBox.style.color = '#34d399';
                    alertBox.style.border = '1px solid #10b981';
                    alertBox.innerText = '✓ イベントの送信に成功しました！';
                } else {
                    throw new Error(data.error || '不明なエラー');
                }
            } catch (err) {
                alertBox.style.backgroundColor = 'rgba(239, 68, 68, 0.15)';
                alertBox.style.color = '#f87171';
                alertBox.style.border = '1px solid #ef4444';
                alertBox.innerText = '❌ エラー: ' + err.message;
            }

            // 3秒後に通知を消す
            setTimeout(() => { alertBox.style.display = 'none'; }, 3000);
        }
    </script>
</body>

</html>
